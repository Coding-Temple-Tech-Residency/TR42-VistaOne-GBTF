name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: "3.12"
  SECRET_KEY: ci-secret-key-for-github-actions
  JWT_SECRET_KEY: ci-jwt-secret-key-for-github-actions
  DB_PASSWORD: test_pass
  DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/vistaone_test
  TEST_DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/vistaone_test
  REDIS_URL: redis://localhost:6379/0
  CELERY_BROKER_URL: redis://localhost:6379/1
  CELERY_RESULT_BACKEND: redis://localhost:6379/1
  FLASK_ENV: testing

defaults:
  run:
    working-directory: backend

jobs:
  quality:
    name: Format and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - run: black --check app tests config.py run.py wsgi.py celery_app.py
      - run: isort --check-only app tests config.py run.py wsgi.py celery_app.py
      - run: flake8 app tests config.py run.py wsgi.py celery_app.py
      - run: bandit -r app
      - run: safety check --full-report

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - run: mypy --config-file mypy.ini

  test:
    name: Pytest
    runs-on: ubuntu-latest
    needs: [quality, typecheck]
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: vistaone_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d vistaone_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - run: pytest tests/ --cov=app --cov-fail-under=100 --cov-report=term-missing --cov-report=xml:coverage.xml -v
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 14