name: Deploy

on:
  workflow_run:
    workflows: ["Docker – Build & Push"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: ${{ vars.APP_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            cd ${{ vars.DEPLOY_PATH || '/opt/vistaone' }}
            git pull origin main

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export WEB_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:latest"
            export WORKER_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:latest"
            export MIGRATE_IMAGE="$WEB_IMAGE"

            docker compose pull web worker
            docker compose run --rm migrate
            docker compose up -d --no-deps web worker

            sleep 10
            docker compose ps
            curl -sf http://localhost:5000/health

            echo "Deployment complete!"
