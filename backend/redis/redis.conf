# Redis configuration file
# See https://redis.io/docs/management/config-file/ for all options

bind 0.0.0.0
protected-mode yes
port 6379
daemonize no
supervised no
pidfile /var/run/redis_6379.pid
dbfilename dump.rdb
logfile ""
dir ./

# Set a password (uncomment and set your own strong password)
# requirepass yourStrongPasswordHere

# Save policy (default)
save 900 1
save 300 10
save 60 10000

# Append only mode (AOF)
# appendonly yes
# appendfilename "appendonly.aof"

# Max memory (uncomment and set as needed)
# maxmemory 256mb
# maxmemory-policy noeviction

# For more options, see the Redis docs.
